<?xml version="1.0" encoding="UTF-8"?>
<svg
  xmlns="http://www.w3.org/2000/svg"
  width="2200"
  height="820"
  viewBox="0 0 2200 820"
>
  <rect width="100%" height="100%" fill="#ffffff"/>

  <style>
    .label {
      font-family: 'Noto Sans CJK KR', 'Malgun Gothic', Arial, sans-serif;
      fill: #171717;
      font-weight: 700;
      letter-spacing: 0;
    }

    .small-label {
      font-family: 'Noto Sans CJK KR', 'Malgun Gothic', Arial, sans-serif;
      fill: #171717;
      font-weight: 700;
      letter-spacing: 0;
    }

    .outline {
      fill: none;
      stroke: #111;
      stroke-width: 5;
      stroke-linejoin: miter;
      stroke-linecap: square;
    }

    .room {
      fill: #eef0c2;
      stroke: #111;
      stroke-width: 3.5;
    }

    .room-light {
      fill: #f1f3c9;
      stroke: #111;
      stroke-width: 3.5;
    }

    .rest {
      fill: #ead6bf;
      stroke: #111;
      stroke-width: 3.5;
    }

    .lobby {
      fill: #f4f4f4;
      stroke: #111;
      stroke-width: 3.5;
    }

    .hall {
      fill: #f7f7f7;
      stroke: #111;
      stroke-width: 3.5;
    }

    .stairs line {
      stroke: #777;
      stroke-width: 2.2;
    }

  </style>

  <defs>
    <g id="man-icon">
      <rect x="0" y="0" width="34" height="38" rx="2" fill="#f4f4f4" stroke="#d1d1d1" stroke-width="2"/>
      <circle cx="17" cy="9" r="4" fill="#2b63ad"/>
      <path d="M17 15 v15 m-7-9 h14 m-9 9 l-3 6 m8-6 l3 6" stroke="#2b63ad" stroke-width="3" stroke-linecap="round"/>
    </g>

    <g id="woman-icon">
      <rect x="0" y="0" width="34" height="38" rx="2" fill="#f4f4f4" stroke="#d1d1d1" stroke-width="2"/>
      <circle cx="17" cy="9" r="4" fill="#a44b44"/>
      <path d="M17 14 l-7 18 h14 z" fill="#a44b44"/>
      <path d="M13 31 v6 m8-6 v6" stroke="#a44b44" stroke-width="3" stroke-linecap="round"/>
    </g>

    <g id="elevator">
      <rect x="0" y="0" width="40" height="40" rx="2" fill="#fff8ee" stroke="#9b7860" stroke-width="4"/>
      <path d="M14 12 l5-6 l5 6 M14 28 l5 6 l5-6" fill="none" stroke="#9b4a3f" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      <rect x="11" y="15" width="18" height="13" rx="1" fill="none" stroke="#9b4a3f" stroke-width="2.5"/>
      <line x1="20" y1="15" x2="20" y2="28" stroke="#9b4a3f" stroke-width="2"/>
    </g>
  </defs>

  <!-- 3층 배지 -->
  <path
    d="M18 230 A82 82 0 0 1 182 230 L176 245 H24 Z"
    fill="#154fb9"
  />
  <path d="M24 245 H176" stroke="#9c9c9c" stroke-width="6"/>
  <text
    x="100"
    y="188"
    text-anchor="middle"
    dominant-baseline="middle"
    class="label"
    font-size="72"
    fill="#ffffff"
  >3층</text>

  <!-- 왼쪽 세로 교과실 -->
  <rect x="30" y="345" width="135" height="88" class="room"/>
  <text x="97.5" y="389" text-anchor="middle" dominant-baseline="middle" class="label" font-size="25">진로진학실</text>

  <rect x="30" y="433" width="135" height="95" class="room"/>
  <text x="97.5" y="481" text-anchor="middle" dominant-baseline="middle" class="label" font-size="27">국어교과실</text>

  <rect x="30" y="528" width="135" height="95" class="room"/>
  <text x="97.5" y="576" text-anchor="middle" dominant-baseline="middle" class="label" font-size="25">사회교과실</text>

  <!-- 왼쪽 계단/홀/문서고 -->
  <rect x="165" y="300" width="125" height="48" class="room-light"/>
  <text x="227.5" y="324" text-anchor="middle" dominant-baseline="middle" class="small-label" font-size="22">물품보관실1</text>

  <rect x="165" y="348" width="125" height="85" class="hall"/>
  <g class="stairs">
    <line x1="175" y1="360" x2="280" y2="360"/>
    <line x1="175" y1="374" x2="280" y2="374"/>
    <line x1="175" y1="388" x2="280" y2="388"/>
    <line x1="175" y1="402" x2="280" y2="402"/>
    <line x1="175" y1="416" x2="280" y2="416"/>
    <line x1="225" y1="352" x2="225" y2="430"/>
  </g>
  <rect x="165" y="433" width="125" height="95" class="hall"/>
  <text x="227.5" y="481" text-anchor="middle" dominant-baseline="middle" class="label" font-size="27">홀</text>

  <rect x="165" y="528" width="125" height="95" class="room-light"/>
  <text x="227.5" y="576" text-anchor="middle" dominant-baseline="middle" class="label" font-size="27">문서고</text>

  <!-- 왼쪽 화장실 / 로비 -->
  <rect x="290" y="300" width="125" height="133" class="rest"/>
  <use href="#man-icon" x="340" y="343"/>

  <rect x="290" y="433" width="155" height="95" class="lobby"/>
  <text x="367.5" y="481" text-anchor="middle" dominant-baseline="middle" class="label" font-size="27">로비</text>

  <!-- 왼쪽 복도와 교실 -->
  <path d="M415 300 H445 V433 H785 V365 H1052 V433 H1138 V660 H935 V528 H445 V433 H415 Z" fill="#ffffff"/>
  <path d="M415 300 H445 V433 H785 V365 H1052 V433 H1138 V660 H935 V528 H445 V433 H415 Z" class="outline"/>

  <rect id="room-3-1" x="445" y="466" width="160" height="62" class="room"/>
  <text x="525" y="497" text-anchor="middle" dominant-baseline="middle" class="label" font-size="30">3-1</text>

  <rect id="room-3-2" x="605" y="466" width="165" height="62" class="room"/>
  <text x="687.5" y="497" text-anchor="middle" dominant-baseline="middle" class="label" font-size="30">3-2</text>

  <rect id="room-3-3" x="770" y="466" width="165" height="62" class="room"/>
  <text x="852.5" y="497" text-anchor="middle" dominant-baseline="middle" class="label" font-size="30">3-3</text>

  <rect x="785" y="365" width="267" height="68" class="room"/>
  <text x="918.5" y="399" text-anchor="middle" dominant-baseline="middle" class="label" font-size="27">3학년 교무실</text>

  <!-- 중앙 계단/물품보관실2 -->
  <rect x="1052" y="300" width="86" height="48" class="room-light"/>
  <text x="1095" y="324" text-anchor="middle" dominant-baseline="middle" class="small-label" font-size="20">물품보관실2</text>

  <rect x="1052" y="348" width="86" height="85" class="hall"/>
  <g class="stairs">
    <line x1="1060" y1="360" x2="1130" y2="360"/>
    <line x1="1060" y1="374" x2="1130" y2="374"/>
    <line x1="1060" y1="388" x2="1130" y2="388"/>
    <line x1="1060" y1="402" x2="1130" y2="402"/>
    <line x1="1060" y1="416" x2="1130" y2="416"/>
  </g>
  <rect id="study-lounge" x="935" y="466" width="203" height="95" class="lobby"/>
  <text x="1036.5" y="514" text-anchor="middle" dominant-baseline="middle" class="label" font-size="27">스터디라운지</text>

  <rect x="935" y="561" width="203" height="99" class="room"/>
  <text x="1036.5" y="611" text-anchor="middle" dominant-baseline="middle" class="label" font-size="27">진로교과실</text>

  <!-- 중앙-오른쪽 복도/교실 -->
  <path d="M1138 433 H1300 V392 H1352 V433 H1715 V295 H1860 V340 H1998 V623 H1860 V528 H1715 V528 H1138 Z" fill="#ffffff"/>
  <path d="M1138 433 H1300 V392 H1352 V433 H1715 V295 H1860 V340 H1998 V623 H1860 V528 H1715 V528 H1138 Z" class="outline"/>
  <use href="#elevator" x="1306" y="382"/>

  <rect id="room-3-4" x="1138" y="466" width="210" height="62" class="room"/>
  <text x="1243" y="497" text-anchor="middle" dominant-baseline="middle" class="label" font-size="30">3-4</text>

  <rect id="room-3-5" x="1348" y="466" width="170" height="62" class="room"/>
  <text x="1433" y="497" text-anchor="middle" dominant-baseline="middle" class="label" font-size="30">3-5</text>

  <rect id="moving-classroom" x="1518" y="466" width="197" height="62" class="room"/>
  <text x="1616.5" y="497" text-anchor="middle" dominant-baseline="middle" class="label" font-size="27">이동수업실</text>

  <rect x="1715" y="295" width="145" height="138" class="rest"/>
  <use href="#woman-icon" x="1780" y="340"/>

  <rect x="1715" y="433" width="145" height="95" class="lobby"/>
  <text x="1787.5" y="481" text-anchor="middle" dominant-baseline="middle" class="label" font-size="27">로비</text>

  <!-- 오른쪽 계단/홀/지원부 -->
  <rect x="1860" y="340" width="138" height="40" class="room-light"/>
  <text x="1929" y="360" text-anchor="middle" dominant-baseline="middle" class="small-label" font-size="21">물품보관실3</text>

  <rect x="1860" y="380" width="138" height="53" class="hall"/>
  <g class="stairs">
    <line x1="1870" y1="388" x2="1988" y2="388"/>
    <line x1="1870" y1="398" x2="1988" y2="398"/>
    <line x1="1870" y1="408" x2="1988" y2="408"/>
    <line x1="1870" y1="418" x2="1988" y2="418"/>
    <line x1="1929" y1="382" x2="1929" y2="430"/>
  </g>
  <rect x="1860" y="433" width="138" height="95" class="hall"/>
  <text x="1929" y="481" text-anchor="middle" dominant-baseline="middle" class="label" font-size="27">홀</text>

  <rect x="1860" y="528" width="138" height="95" class="room"/>
  <text x="1929" y="576" text-anchor="middle" dominant-baseline="middle" class="label" font-size="25">교육지원부D</text>

  <!-- 오른쪽 교과실 -->
  <rect x="1998" y="340" width="142" height="142" class="room"/>
  <text x="2069" y="411" text-anchor="middle" dominant-baseline="middle" class="label" font-size="27">수학교과실</text>

  <rect x="1998" y="482" width="142" height="141" class="room"/>
  <text x="2069" y="553" text-anchor="middle" dominant-baseline="middle" class="label" font-size="27">영어교과실</text>

  <!-- 본관 배지 -->
  <rect
    x="780"
    y="632"
    width="135"
    height="68"
    rx="7"
    fill="#6e9e32"
  />
  <text
    x="847.5"
    y="667"
    text-anchor="middle"
    dominant-baseline="middle"
    class="label"
    font-size="42"
    fill="#ffffff"
  >본 관</text>
</svg>
